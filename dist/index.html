<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Common Tests</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module">
        import {hasClass, hideElement, showElement} from './js/common.js';

        if(hasClass(document.getElementById("test"),"testClass"))
            console.log("Has class");
        else
            console.error("No class found!");

        if(hasClass(document.getElementById("test"),"foo"))
            console.error("Has class");
        else
            console.log("No class found!")

        hideElement(document.getElementById("test"));

        setTimeout(() => {
            showElement(document.getElementById("test"));
        }, 2000);
    </script>
    <script nomodule>
        document.body.innerHTML("<p>Please upgrade your browser to one that supports JS modules!</p>");
    </script>
</head>
<body>
    <p id="test" class="testClass">This is a test paragraph</p>
</body>
</html>
